<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二维码 - 扫码挪车</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); padding: 40px 36px; width: 100%; max-width: 440px; text-align: center; }
  .hero-icon { font-size: 52px; margin-bottom: 10px; }
  h1 { font-size: 26px; margin-bottom: 8px; color: #1a1a2e; font-weight: 700; }
  .subtitle { color: #888; font-size: 15px; margin-bottom: 28px; }
  input { width: 100%; padding: 13px 16px; border: 1.5px solid #e8e8e8; border-radius: 12px; font-size: 16px; outline: none; transition: all 0.25s; font-family: inherit; margin-bottom: 14px; }
  input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.12); }
  .gen-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 14px; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.25s; letter-spacing: 0.5px; margin-bottom: 20px; }
  .gen-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(102,126,234,0.4); }
  .msg { font-size: 14px; margin-bottom: 14px; min-height: 20px; }
  .msg.err { color: #e74c3c; }

  /* 二维码区域 */
  .qr-area { display: none; }
  .qr-wrapper { background: #fff; border-radius: 16px; padding: 20px; display: inline-block; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 16px; }
  .qr-wrapper canvas { border-radius: 8px; display: block; }
  .owner-badge { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 8px 18px; border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 16px; }
  .action-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .action-btn { padding: 11px 22px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .action-btn.primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .action-btn.secondary { background: #f0f0f0; color: #555; }
  .action-btn:hover { transform: translateY(-1px); }
  .action-btn:active { transform: translateY(0); }

  /* 使用说明 */
  .guide { text-align: left; background: #f8f7ff; border: 1px solid #e0dcff; border-radius: 14px; padding: 16px 18px; margin-top: 20px; }
  .guide-title { font-size: 13px; font-weight: 700; color: #667eea; margin-bottom: 10px; display: flex; align-items: center; gap: 5px; }
  .guide ol { font-size: 13px; color: #666; padding-left: 18px; line-height: 1.9; }
  .guide ol li { margin-bottom: 2px; }
  .guide ol li strong { color: #333; }

  /* Token 自动带入 */
  .token-display { font-size: 12px; color: #999; margin-bottom: 10px; display: none; }
  .token-display code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-family: 'Courier New', monospace; }
</style>
</head>
<body>
<div class="card">
  <div class="hero-icon">📱</div>
  <h1>生成挪车二维码</h1>
  <p class="subtitle">输入 Token 生成专属挪车码</p>

  <input type="text" id="tokenInput" placeholder="请输入或粘贴 Token">
  <div class="token-display" id="tokenDisplay"></div>
  <button class="gen-btn" id="genBtn">🎯 生成二维码</button>
  <div class="msg" id="msg"></div>

  <div class="qr-area" id="qrArea">
    <div class="qr-wrapper">
      <div id="qrcode"></div>
    </div>
    <div class="owner-badge" id="ownerBadge">🚗 车主已认证</div>
    <div class="action-btns">
      <button class="action-btn primary" id="downloadBtn">⬇️ 下载二维码</button>
      <button class="action-btn secondary" id="printBtn">🖨️ 打印</button>
      <button class="action-btn secondary" id="copyUrlBtn">📋 复制链接</button>
    </div>

    <div class="guide">
      <div class="guide-title">📋 使用说明</div>
      <ol>
        <li><strong>下载或打印</strong>二维码，贴在车窗内侧</li>
        <li>有人需要您挪车时，<strong>扫码</strong>选择情况并留言</li>
        <li>您会收到 <strong>Bark 推送</strong>，显示挪车位置和原因</li>
        <li>文明停车，方便你我他 🚗</li>
      </ol>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
// 自动从 URL 读取 scan_id（新版）或 token（兼容旧版）
const urlParams = new URLSearchParams(window.location.search);
const autoScanId = urlParams.get('scan_id');
const autoToken = urlParams.get('token');

if (autoScanId) {
  document.getElementById('tokenInput').value = autoScanId;
  document.getElementById('tokenDisplay').style.display = 'block';
  document.getElementById('tokenDisplay').innerHTML = 'Scan ID：<code>' + autoScanId + '</code>';
  setTimeout(() => document.getElementById('genBtn').click(), 300);
} else if (autoToken) {
  // 兼容旧版 token 链接
  document.getElementById('tokenInput').value = autoToken;
  document.getElementById('tokenDisplay').style.display = 'block';
  document.getElementById('tokenDisplay').innerHTML = 'Token（兼容）：<code>' + autoToken + '</code>';
  setTimeout(() => document.getElementById('genBtn').click(), 300);
}

let currentScanId = autoScanId || '';
let currentToken = autoToken || '';
let currentUrl = '';

document.getElementById('genBtn').addEventListener('click', async () => {
  const input = document.getElementById('tokenInput').value.trim();
  const msg = document.getElementById('msg');
  const qrArea = document.getElementById('qrArea');
  if (!input) { msg.textContent = '请输入 Scan ID 或 Token'; msg.className = 'msg err'; return; }
  msg.textContent = '';
  msg.className = 'msg';
  try {
    // 优先用 scan_id 查；fallback 到 token（兼容旧链接）
    let owner;
    let scanId = '';
    try {
      const resp = await fetch(`/api/scan/${input}`);
      if (resp.ok) {
        owner = await resp.json();
        scanId = input;
      }
    } catch (_) { /* fall through */ }

    if (!owner) {
      const resp2 = await fetch(`/api/qr/${input}`);
      if (!resp2.ok) { msg.textContent = '不存在？请前往注册'; msg.className = 'msg err'; return; }
      owner = await resp2.json();
      scanId = ''; // token 模式，QR URL 仍用 token
    }

    currentScanId = scanId;
    currentToken = input;
    // 二维码 URL 始终使用 scan_id（更安全）
    const qrParam = scanId ? `scan_id=${scanId}` : `token=${input}`;
    const notifyUrl = `${location.origin}/static/index.html?${qrParam}`;
    currentUrl = notifyUrl;

    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = '';
    // Create canvas element first, then render QR
    const canvas = document.createElement('canvas');
    canvas.width = 220;
    canvas.height = 220;
    canvas.style.borderRadius = '8px';
    qrDiv.appendChild(canvas);
    QRCode.toCanvas(canvas, notifyUrl, { width: 220 }, (err) => {
      if (err) console.error('QR error:', err);
    });

    const badge = document.getElementById('ownerBadge');
    badge.textContent = `🚗 ${owner.name} · 挪车码`;

    qrArea.style.display = 'block';
  } catch {
    msg.textContent = '网络错误，请稍后重试'; msg.className = 'msg err';
  }
});

document.getElementById('downloadBtn').addEventListener('click', () => {
  const canvas = document.querySelector('#qrcode canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = `挪车码_${currentToken.slice(0, 8)}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

document.getElementById('printBtn').addEventListener('click', () => {
  const canvas = document.querySelector('#qrcode canvas');
  if (!canvas) return;
  const img = canvas.toDataURL('image/png');
  const w = window.open('', '', 'width=400,height=500');
  w.document.write(`<html><head><title>挪车二维码</title><style>body{text-align:center;padding:30px;font-family:sans-serif}h2{color:#333;font-size:20px;margin-bottom:20px}img{border-radius:8px;border:2px solid #eee}p{color:#888;font-size:14px;margin-top:16px}</style></head><body><h2>🚗 扫码挪车</h2><img src="${img}" width="220"><p>扫描后填写情况，车主即会收到通知</p></body></html>`);
  w.document.close();
  w.focus();
  setTimeout(() => { w.print(); w.close(); }, 500);
});

document.getElementById('copyUrlBtn').addEventListener('click', () => {
  if (!currentUrl) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(currentUrl).then(() => {
      const btn = document.getElementById('copyUrlBtn');
      btn.textContent = '✅ 已复制';
      setTimeout(() => btn.textContent = '📋 复制链接', 1500);
    });
  }
});
</script>
</body>
</html>
