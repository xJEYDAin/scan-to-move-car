<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>挪车确认</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); padding: 40px 36px; width: 100%; max-width: 420px; text-align: center; }
  .icon { font-size: 80px; margin-bottom: 20px; }
  h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 16px; }
  p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 20px; }
  .info { background: #f5f5f5; border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: left; }
  .info-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
  .info-item:last-child { border-bottom: none; }
  .info-label { color: #888; font-size: 13px; }
  .info-value { color: #333; font-size: 14px; font-weight: 500; }
  .btn-group { display: flex; gap: 12px; }
  .btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-confirm { background: linear-gradient(135deg, #28a745, #20c997); color: #fff; }
  .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(40,167,69,0.4); }
  .btn-confirm:disabled { background: #ccc; transform: none; cursor: not-allowed; }
  .btn-reject { background: #f5f5f5; color: #666; }
  .btn-reject:hover { background: #e8e8e8; }
  .status-box { padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 14px; }
  .status-success { background: #d4edda; color: #155724; }
  .status-error { background: #f8d7da; color: #721c24; }
  .loading { color: #888; font-size: 16px; }
</style>
</head>
<body>
<div class="card">
  <div id="loading" class="loading">加载中...</div>
  
  <div id="content" style="display:none;">
    <div class="icon">🚗</div>
    <h1>有人需要您挪车</h1>
    <p>请确认是否能够挪车</p>
    
    <div class="info">
      <div class="info-item">
        <span class="info-label">被挡车牌</span>
        <span class="info-value" id="carPlate" style="font-weight:700;color:#667eea;">-</span>
      </div>
      <div class="info-item">
        <span class="info-label">场景</span>
        <span class="info-value" id="scenario">-</span>
      </div>
      <div class="info-item">
        <span class="info-label">留言</span>
        <span class="info-value" id="message">-</span>
      </div>
    </div>
    
    <div id="statusBox" class="status-box" style="display:none;"></div>
    
    <div class="btn-group" id="btnGroup">
      <button class="btn btn-confirm" id="confirmBtn" onclick="doConfirm()">✅ 确认挪车</button>
      <button class="btn btn-reject" id="rejectBtn" onclick="doReject()">❌ 拒绝</button>
    </div>
  </div>
  
  <div id="done" style="display:none;">
    <div class="icon" id="doneIcon">✅</div>
    <h1 id="doneTitle">操作完成</h1>
    <p id="doneMsg">感谢您的配合</p>
  </div>
  
  <div id="error" style="display:none;">
    <div class="icon">❌</div>
    <h1>链接已失效</h1>
    <p>此确认链接已过期或不存在</p>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const key = params.get('key');

if (!key) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
} else {
  loadConfirmPage(key);
}

async function loadConfirmPage(key) {
  try {
    // 查询状态 - 使用 /api/status/key/{key}
    const resp = await fetch('/api/status/key/' + encodeURIComponent(key));
    if (!resp.ok) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      return;
    }
    
    const data = await resp.json();
    
    if (data.status === 'not_found') {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      return;
    }
    
    document.getElementById('carPlate').textContent = data.car_plate || '-';
    document.getElementById('scenario').textContent = data.scenario || '-';
    document.getElementById('message').textContent = data.message || '-';
    
    if (data.status === 'confirmed') {
      showDone('✅', '已确认', '感谢您的配合');
    } else if (data.status === 'rejected') {
      showDone('❌', '已拒绝', '对方已收到拒绝通知');
    } else {
      document.getElementById('content').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
    }
  } catch (e) {
    console.error(e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}

async function doConfirm() {
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = '处理中...';
  
  try {
    const resp = await fetch('/api/confirm/' + encodeURIComponent(key), { 
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    const data = await resp.json();
    
    if (data.ok) {
      showDone('✅', '确认成功', '已通知对方，请尽快挪车');
    } else {
      showError(data.message || '操作失败');
      btn.disabled = false;
      btn.textContent = '✅ 确认挪车';
    }
  } catch (e) {
    showError('操作失败，请稍后重试');
    btn.disabled = false;
    btn.textContent = '✅ 确认挪车';
  }
}

async function doReject() {
  if (!confirm('确定要拒绝吗？对方将收到拒绝通知。')) return;
  
  const btn = document.getElementById('rejectBtn');
  btn.disabled = true;
  btn.textContent = '处理中...';
  
  try {
    const resp = await fetch('/api/reject/' + encodeURIComponent(key), { 
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    const data = await resp.json();
    
    if (data.ok) {
      showDone('❌', '已拒绝', '对方已收到拒绝通知');
    } else {
      showError(data.message || '操作失败');
      btn.disabled = false;
      btn.textContent = '❌ 拒绝';
    }
  } catch (e) {
    showError('操作失败');
    btn.disabled = false;
    btn.textContent = '❌ 拒绝';
  }
}

function showError(msg) {
  const statusBox = document.getElementById('statusBox');
  statusBox.textContent = msg;
  statusBox.className = 'status-box status-error';
  statusBox.style.display = 'block';
}

function showDone(icon, title, msg) {
  document.getElementById('content').style.display = 'none';
  document.getElementById('done').style.display = 'block';
  document.getElementById('doneIcon').textContent = icon;
  document.getElementById('doneTitle').textContent = title;
  document.getElementById('doneMsg').textContent = msg;
}
</script>
</body>
</html>
