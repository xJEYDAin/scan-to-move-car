name = "scan-to-move-car"
main = "movecar.js"
compatibility_date = "2024-01-01"

# ── 静态文件（Workers Assets，自动 CDN 分发）──
# 将静态文件放入 ../public/ 目录（相对路径或绝对路径均可）
# 部署命令：wrangler deploy
# 注意：Windows 用户请使用绝对路径，如 assets = { directory = "C:/path/to/public" }
assets = { directory = "../public" }

# ── KV 命名空间 ──
# 首次创建：
#   wrangler kv:namespace create "SCAN_KV"
# 将返回的 id 填入下方：
[[kv_namespaces]]
binding = "SCAN_KV"
id = "YOUR_KV_NAMESPACE_ID"

# ── 环境变量（可选）──
# Bark 服务器地址，默认 api.day.app
# 如使用自建 Bark 服务，设置为你的 Bark 服务器地址
# wrangler secret put BARK_BASE_URL
#
# 确认页基础 URL，用于生成短链接重定向和 Bark 通知中的确认链接
# 默认 https://scan-to-move-car.rolojyssill.pages.dev
# wrangler secret put CONFIRM_BASE_URL
[vars]
MAX_PER_DAY = "20"
